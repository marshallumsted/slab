<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>slab</title>
  <link rel="stylesheet" href="design.css">
  <link rel="stylesheet" href="shell.css">
</head>
<body>

  <!-- Tile grid (desktop surface) -->
  <div id="tile-grid">
    <div class="tile-grid-inner" id="tile-grid-inner">
      <!-- Live tiles get injected here -->
    </div>
  </div>

  <!-- Desktop surface (windows layer) -->
  <div id="desktop">
    <!-- Windows get injected here -->
  </div>

  <!-- Taskbar (toolbar) -->
  <div id="taskbar">
    <div class="taskbar-left" id="taskbar-apps">
      <!-- Open apps and workflow tabs appear here -->
    </div>
    <div class="taskbar-right">
      <div class="taskbar-spawn" id="taskbar-spawn">
        <!-- Spawn buttons built dynamically from app manifests -->
      </div>
      <div class="taskbar-divider"></div>
      <button class="taskbar-settings-btn" id="taskbar-settings" title="Settings">
        <svg viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8,1.5 L8,3.5 M8,12.5 L8,14.5 M1.5,8 L3.5,8 M12.5,8 L14.5,8 M3.3,3.3 L4.7,4.7 M11.3,11.3 L12.7,12.7 M3.3,12.7 L4.7,11.3 M11.3,4.7 L12.7,3.3" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <div class="taskbar-divider"></div>
      <span class="taskbar-clock" id="taskbar-clock"></span>
    </div>
  </div>

  <!-- Settings popup -->
  <div id="settings-popup" class="settings-popup hidden">
    <div class="settings-popup-inner">
      <div class="settings-popup-title">Quick Settings</div>
      <div class="settings-popup-grid" id="settings-popup-grid">
        <!-- Quick settings tiles injected here -->
      </div>
    </div>
  </div>

  <!-- Dependencies loaded dynamically based on installed apps -->
  <script src="shell.js"></script>
</body>
</html>
